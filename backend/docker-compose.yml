version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: njangitrack_postgres
    environment:
      POSTGRES_USER: njangi_user
      POSTGRES_PASSWORD: njangi_pass
      POSTGRES_DB: njangitrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:7-alpine
    container_name: njangitrack_redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: njangitrack_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: njangi_user
      RABBITMQ_DEFAULT_PASS: njangi_pass
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data: